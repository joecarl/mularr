<div style="display: flex; flex-direction: column;">

		<div style="font-size: 12px;">
			<div style="font-size: 11px; opacity: 0.5; margin-bottom: 4px;">
				Automatic clipboard copy is not available in this browser or context.
			</div>
			<div style="font-size: 12px;">Press Ctrl+C (Cmd+C on Mac) to copy the selected text below.</div>
