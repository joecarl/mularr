<div style="display: flex; flex-direction: column; gap: 10px;">

	<textarea data-cb="linksInput" rows="10"
		style="width: 100%; box-sizing: border-box; resize: vertical; font-family: monospace; font-size: 12px;"

	<div style="display: flex; justify-content: flex-end; gap: 8px;">

	</div>
</div>
