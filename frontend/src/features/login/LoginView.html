<div class="login-view">
	<div class="ui-window login-window">
		<div class="ui-window-header">
			<span class="ui-window-title login-window-title">
				<img src="/favicon.ico" alt="" class="login-logo-img" />
				Mularr
			</span>
		</div>
		<div class="ui-window-content login-window-content">
			<form data-cb="form" class="login-form">
				<div class="login-field">
					<label class="login-label">Username</label>
					<input type="text" data-cb="username" class="login-input" autocomplete="username" />
				</div>
				<div class="login-field">
					<label class="login-label">Password</label>
					<input type="password" data-cb="password" class="login-input" autocomplete="current-password" />
				</div>
				<div data-cb="errorMsg" class="login-error"></div>
				<button type="submit" data-cb="submitBtn" class="ui-btn login-btn">Sign In</button>
			</form>
		</div>
	</div>
</div>
