<aside class="sidebar">
	<div class="sidebar-header">
		<span class="app-logo" style="padding-right: 1em;">
			<img src="/favicon.ico" alt="aMule Logo" />
			Mularr
		</span>
	</div>

	<div class="sidebar-box sidebar-box-primary">
		<div class="sidebar-box-header">
			aMule
		</div>
		<div class="sidebar-box-content">

			<nav class="nav-links" data-cb="navLinks">
				<a href="/shared" class="nav-item" data-cb="navSharedDummy">
					<span data-cb="navIconEmoji" class="nav-icon-emoji">📂</span>
					<img data-cb="navIcon" class="nav-icon">
					<span data-cb="navLabel" class="nav-label">
						Shared Files
					</span>
				</a>
			</nav>
		</div>
	</div>

	<div style="flex: 1"></div>

	<div class="sidebar-box">
		<div class="sidebar-box-header">🛜 Network</div>
		<div class="network-container sidebar-box-content" data-cb="networkContainer">

			<div data-cb="infoItem" class="network-item">
				<div data-cb="infoIcon" class="network-item-icon"></div>
				<div class="network-item-right">
					<div data-cb="infoLabel" class="network-item-label"></div>
					<div data-cb="infoValue" class="network-item-value"></div>
				</div>
			</div>

			<div data-cb="vpnInfo" class="vpn-info-card sidebar-box-info-card">
				<div class="vpn-info-header">
					<div class="vpn-info-title">
						<span class="vpn-info-icon">🔒</span>
						<span>VPN</span>
					</div>
					<span data-cb="vpnStatusBadge" class="vpn-badge sidebar-badge"></span>
				</div>
				<div data-cb="vpnPortContainer" class="vpn-port-info">
					<span class="vpn-port-label">Forwarded Port</span>
					<span data-cb="vpnPortValue" class="vpn-port-value"></span>
				</div>
			</div>
		</div>
	</div>

	<div class="sidebar-box">
		<div class="sidebar-box-header">🌍 Connection</div>
		<div class="connection-box sidebar-box-content" data-cb="connectionContainer">
			<div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 2px;">
				<span data-cb="connStatusText" class="connection-status-text">Connected</span>
				<span data-cb="highIdBadge" class="sidebar-badge"></span>
			</div>

			<div class="sidebar-box-info-card">
				<div class="server-name" data-cb="serverName"></div>
				<div class="server-ip-port" data-cb="serverIpPort"></div>
				<div class="server-desc" data-cb="serverDesc"></div>
			</div>

			<div style="display: flex; gap: 4px; margin-top: 4px; justify-content: start;">
				<span data-cb="ed2kBadge" class="sidebar-badge" style="gap: 4px;">
					<span data-cb="ed2kBadgeIcon"></span>
					<span>ED2K</span>
				</span>
				<span data-cb="kadBadge" class="sidebar-badge" style="gap: 4px;">
					<span data-cb="kadBadgeIcon"></span>
					<span>KAD</span>
				</span>
			</div>
		</div>
	</div>

	<div class="sidebar-box">
		<div class="sidebar-box-header">🫀 Status</div>
		<div class="stats-container sidebar-box-content">
			<div class="sidebar-box-info-card" data-cb="statsContainer">
				Loading stats...
				<!-- Plantillas: usar desde TS con tpl.statRow/tpl.statsSep/tpl.statsBr en lugar de crear nodos manualmente -->
				<div data-cb="statRow" class="stat-row">
					<span data-cb="statLabel" class="stat-label"></span>
					<span class="stat-value-group">
						<span data-cb="statValue" class="stat-value"></span>
						<span data-cb="statUnit" class="stat-unit"></span>
					</span>
				</div>
				<hr data-cb="statsSep" />
				<br data-cb="statsBr" />
			</div>
		</div>
	</div>

	<div class="sidebar-footer">
		<button data-cb="logoutBtn" class="sidebar-logout-btn" title="Log out">⏻</button>
		<a class="gh-link" href="https://github.com/joecarl/mularr" target="_blank" rel="noopener"
			title="GitHub repository">
			<svg class="gh-icon" viewBox="0 0 16 16" aria-hidden="true">
				<path
					d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.65 7.65 0 0 1 2-.27c.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z" />
			</svg>
		</a>
		<div data-cb="appVersion" class="sidebar-version"></div>
	</div>
</aside>
